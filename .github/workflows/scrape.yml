name: Scrape Rep Data

on:
  schedule:
    # Weekly Monday 10am ET (15:00 UTC)
    - cron: '0 15 * * 1'
    # Monthly 1st at 10am ET
    - cron: '0 15 1 * *'
  workflow_dispatch:
    inputs:
      state:
        description: 'State code (blank = all)'
        required: false
        default: ''
      scope:
        description: 'Which data to scrape'
        required: true
        default: 'all'
        type: choice
        options:
          - all
          - state-only
          - local-only
          - boundaries-only

concurrency:
  group: scrape
  cancel-in-progress: true

jobs:
  scrape:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - run: pip install -r requirements.txt

      - name: Determine scope
        id: scope
        run: |
          if [ "${{ github.event_name }}" = "schedule" ]; then
            if [ "${{ github.event.schedule }}" = "0 15 * * 1" ]; then
              echo "args=--state-only" >> $GITHUB_OUTPUT
            elif [ "${{ github.event.schedule }}" = "0 15 1 * *" ]; then
              echo "args=" >> $GITHUB_OUTPUT
            fi
          else
            # Manual dispatch
            ARGS=""
            if [ -n "${{ github.event.inputs.state }}" ]; then
              ARGS="$ARGS --state ${{ github.event.inputs.state }}"
            fi
            SCOPE="${{ github.event.inputs.scope || 'all' }}"
            if [ "$SCOPE" = "state-only" ]; then
              ARGS="$ARGS --state-only"
            elif [ "$SCOPE" = "local-only" ]; then
              ARGS="$ARGS --local-only"
            elif [ "$SCOPE" = "boundaries-only" ]; then
              ARGS="$ARGS --boundaries-only"
            fi
            echo "args=$ARGS" >> $GITHUB_OUTPUT
          fi

      - name: Run scrapers
        run: python -m scrapers ${{ steps.scope.outputs.args }} --report scrape-report.json

      - name: Upload scrape report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: scrape-report
          path: scrape-report.json
          retention-days: 30

      - name: Validate data
        run: python validate.py

      - name: Check for stale data
        id: stale
        run: |
          STALE=$(python scripts/stale_check.py --threshold 90)
          echo "output<<EOF" >> $GITHUB_OUTPUT
          echo "$STALE" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

      - name: Create PR if data changed
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          if git diff --quiet data/; then
            echo "No data changes detected"
            exit 0
          fi

          # Build PR body before committing (diff against current HEAD)
          git add data/
          BODY=$(python scripts/diff_summary.py --base HEAD --report scrape-report.json)

          BRANCH="data-update/$(date +%Y-%m-%d-%H%M)"
          git checkout -b "$BRANCH"
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git commit -m "chore: update rep data $(date +%Y-%m-%d)"
          git push -u origin "$BRANCH"
          STALE="${{ steps.stale.outputs.output }}"
          if [ -n "$STALE" ] && echo "$STALE" | grep -q "stale"; then
            BODY="$BODY

          ### Stale Data Warnings

          $STALE"
          fi

          BODY="$BODY

          ---
          Validation passed. Auto-merge enabled for data-update branches."

          gh pr create \
            --title "chore: update rep data $(date +%Y-%m-%d)" \
            --body "$BODY" \
            --base master

  notify-failure:
    needs: scrape
    if: failure()
    runs-on: ubuntu-latest
    permissions:
      issues: write
    steps:
      - uses: actions/checkout@v4
      - name: Create or update failure issue
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TITLE="[CI] Scrape failed — $(date +%Y-%m-%d)"
          BODY="Scrape workflow failed.

          **Run:** ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
          **Trigger:** ${{ github.event_name }}
          **Date:** $(date -u +%Y-%m-%dT%H:%M:%SZ)

          Check the workflow logs and scrape report artifact for details."

          # Check for existing open issue
          EXISTING=$(gh issue list --label ci-failure --state open --search "Scrape failed" --json number --jq '.[0].number // empty')

          if [ -n "$EXISTING" ]; then
            gh issue comment "$EXISTING" --body "$BODY"
          else
            gh label create ci-failure --color d73a4a --description "Automated CI failure notification" --force
            gh issue create --title "$TITLE" --body "$BODY" --label ci-failure
          fi
