name: Publish npm Packages

on:
  schedule:
    # Weekly Friday 6pm ET (23:00 UTC)
    - cron: '0 23 * * 5'
  workflow_dispatch:

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - uses: actions/setup-node@v5
        with:
          node-version: '22'
          registry-url: 'https://registry.npmjs.org'

      - name: Verify NPM_TOKEN is configured
        env:
          NPM_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: |
          if [ -z "$NPM_TOKEN" ]; then
            echo "::error::NPM_TOKEN secret is not configured. See CLAUDE.md for setup instructions."
            exit 1
          fi

      - name: Check if data changed since last tag
        id: check
        run: |
          LAST_TAG=$(git describe --tags --abbrev=0 2>/dev/null || echo "")
          if [ -z "$LAST_TAG" ]; then
            echo "changed=true" >> $GITHUB_OUTPUT
          elif git diff --quiet "$LAST_TAG" -- data/; then
            echo "changed=false" >> $GITHUB_OUTPUT
          else
            echo "changed=true" >> $GITHUB_OUTPUT
          fi

      - name: Bump version
        if: steps.check.outputs.changed == 'true'
        run: |
          npm version patch --no-git-tag-version
          VERSION=$(node -p "require('./package.json').version")
          # Sync boundaries version
          node -e "const p=require('./boundaries-package.json'); p.version='$VERSION'; require('fs').writeFileSync('boundaries-package.json', JSON.stringify(p, null, 2)+'\n')"

      - name: Validate package contents (dry run)
        if: steps.check.outputs.changed == 'true'
        run: |
          echo "=== open-civics package contents ==="
          npm publish --dry-run --access public 2>&1
          echo ""
          echo "=== open-civics-boundaries package contents ==="
          TMPDIR=$(mktemp -d)
          cp boundaries-package.json "$TMPDIR/package.json"
          cp -r data "$TMPDIR/data"
          cd "$TMPDIR"
          npm publish --dry-run --access public 2>&1
          cd -
          rm -rf "$TMPDIR"

      - name: Publish open-civics
        if: steps.check.outputs.changed == 'true'
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: npm publish --access public

      - name: Publish open-civics-boundaries
        if: steps.check.outputs.changed == 'true'
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: |
          TMPDIR=$(mktemp -d)
          cp boundaries-package.json "$TMPDIR/package.json"
          cp -r data "$TMPDIR/data"
          cd "$TMPDIR"
          npm publish --access public
          cd -
          rm -rf "$TMPDIR"

      - name: Commit version bump and tag
        if: steps.check.outputs.changed == 'true'
        run: |
          VERSION=$(node -p "require('./package.json').version")
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add package.json boundaries-package.json
          git commit -m "chore: bump version to v$VERSION"
          git tag "v$VERSION"
          git push && git push --tags

  notify-failure:
    needs: publish
    if: failure()
    runs-on: ubuntu-latest
    permissions:
      issues: write
    steps:
      - uses: actions/checkout@v5
      - name: Create or update failure issue
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TITLE="[CI] Publish failed — $(date +%Y-%m-%d)"
          BODY="npm publish workflow failed.

          **Run:** ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
          **Trigger:** ${{ github.event_name }}
          **Date:** $(date -u +%Y-%m-%dT%H:%M:%SZ)

          Check the workflow logs to see which publish step failed (version bump, npm publish, or tagging)."

          EXISTING=$(gh issue list --label ci-failure --state open --search "Publish failed" --json number --jq '.[0].number // empty')

          if [ -n "$EXISTING" ]; then
            gh issue comment "$EXISTING" --body "$BODY"
          else
            gh label create ci-failure --color d73a4a --description "Automated CI failure notification" --force
            gh issue create --title "$TITLE" --body "$BODY" --label ci-failure
          fi
