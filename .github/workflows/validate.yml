name: Validate Data

on:
  # No paths filter: validation must run on every PR so that (a) branch
  # protection's required "validate" check is always reported, and (b) a PR
  # whose latest commit is docs-only can't skip the gate. pytest + validate.py
  # are fast, so running them on all PRs is cheap.
  pull_request:

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-python@v6
        with:
          python-version: '3.12'
      - run: pip install -r requirements.txt
      - run: pip install -r requirements-dev.txt
      - run: pytest tests/unit/ -v
      - run: python validate.py

  auto-merge:
    needs: validate
    runs-on: ubuntu-latest
    if: startsWith(github.head_ref, 'data-update/')
    permissions:
      contents: write
      pull-requests: write
    steps:
      - uses: actions/checkout@v5
      - name: Auto-merge data update PR
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh pr merge ${{ github.event.pull_request.number }} \
            --squash \
            --auto \
            --delete-branch

  notify-failure:
    needs: validate
    if: failure()
    runs-on: ubuntu-latest
    permissions:
      issues: write
    steps:
      - uses: actions/checkout@v5
      - name: Create or update failure issue
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TITLE="[CI] Validation failed — $(date +%Y-%m-%d)"
          BODY="Validation workflow failed on PR #${{ github.event.pull_request.number }}.

          **Run:** ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
          **PR:** ${{ github.event.pull_request.html_url }}
          **Date:** $(date -u +%Y-%m-%dT%H:%M:%SZ)

          Check the workflow logs for validation errors."

          EXISTING=$(gh issue list --label ci-failure --state open --search "Validation failed" --json number --jq '.[0].number // empty')

          if [ -n "$EXISTING" ]; then
            gh issue comment "$EXISTING" --body "$BODY"
          else
            gh label create ci-failure --color d73a4a --description "Automated CI failure notification" --force
            gh issue create --title "$TITLE" --body "$BODY" --label ci-failure
          fi
